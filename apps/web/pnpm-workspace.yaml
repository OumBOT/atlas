# Config pnpm du front (workspace mono-paquet).
packages:
  - '.'

# pnpm >= 11 — protections supply-chain :
# minimumReleaseAge bloque les paquets publiés < 24h (désactivé en dev,
# à re-durcir une fois les deps stabilisées).
minimumReleaseAge: 0

# Scripts d'installation autorisés (liste blanche explicite).
onlyBuiltDependencies:
  - esbuild
